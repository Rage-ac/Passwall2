name: Test OpenWrt SDK

on:
  workflow_dispatch:
    inputs: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test SDK images for apk
        run: |
          echo "=== Testing 24.10.0 ==="
          docker run --rm openwrt/sdk:aarch64_cortex-a53-24.10.0 bash -c '
            echo "PATH=$PATH"
            which apk 2>/dev/null || echo "apk not found in PATH"
            find / -name "apk" -type f 2>/dev/null || echo "apk binary not found anywhere"
            find / -name "apk-tools*" 2>/dev/null || echo "no apk-tools"
            ls -la staging_dir/host/bin/ 2>/dev/null | head -20
            ls -la build_dir/host/ 2>/dev/null | grep apk || echo "no apk in build_dir"
          '

          echo ""
          echo "=== Testing latest snapshot ==="
          docker run --rm openwrt/sdk:aarch64_cortex-a53-snapshot bash -c '
            echo "PATH=$PATH"
            which apk 2>/dev/null || echo "apk not found in PATH"
            find / -name "apk" -type f 2>/dev/null || echo "apk binary not found anywhere"
            find / -name "apk-tools*" 2>/dev/null || echo "no apk-tools"
            ls -la staging_dir/host/bin/ 2>/dev/null | head -20
          ' 2>&1 || echo "snapshot image not available"
